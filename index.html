<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
  <title>Document</title>
</head>

<body>
  <div class="container">

    <header class="header">
      <div class="header-left">
        <img src="images/logo.svg" alt="Sneakers logo image" class="header-logo">

        <nav class="nav">
          <button class="menu-button" aria-label="Open menu">
            <img src="images/icon-menu.svg" alt="">
          </button>

          <ul class="nav-list">
            <li><a href="#">Collections</a></li>
            <li><a href="#">Men</a></li>
            <li><a href="#">Women</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
          </ul>
        </nav>
      </div>

      <div class="header-icons">
        <button class="shopping-cart" aria-label="Open shopping cart">
          <img src="images/icon-cart.svg" alt="">
          <span class="cart-badge">0</span>
        </button>

        <button class="user-account" aria-label="Open user account">
          <img src="images/image-avatar.png" alt="User account" class="profile-img">
        </button>
      </div>
    </header>

    <main>
      <article class="product">

        <div class="product-gallery">

          <div class="mobile-slider-container">
            <button class="slider-arrow prev-btn" aria-label="Previous image">
              <img src="images/icon-previous.svg" alt="">
            </button>

            <div class="mobile-slides">
              <img class="mobile-slide active" src="images/image-product-1.jpg" alt="Product view 1">
              <img class="mobile-slide" src="images/image-product-2.jpg" alt="Product view 2">
              <img class="mobile-slide" src="images/image-product-3.jpg" alt="Product view 3">
              <img class="mobile-slide" src="images/image-product-4.jpg" alt="Product view 4">
            </div>

            <button class="slider-arrow next-btn" aria-label="Next image">
              <img src="images/icon-next.svg" alt="">
            </button>
          </div>

          <div class="desktop-gallery-container">
            <div class="main-image-btn">
              <img id="main-product-image" src="images/image-product-1.jpg" alt="Fall Limited Edition Sneakers">
            </div>

            <div class="thumbnail-list">
              <button class="thumbnail active">
                <img src="images/image-product-1-thumbnail.jpg" alt="">
              </button>
              <button class="thumbnail">
                <img src="images/image-product-2-thumbnail.jpg" alt="">
              </button>
              <button class="thumbnail">
                <img src="images/image-product-3-thumbnail.jpg" alt="">
              </button>
              <button class="thumbnail">
                <img src="images/image-product-4-thumbnail.jpg" alt="">
              </button>
            </div>
          </div>

        </div>
        <div class="product-info">
          <div class="title-group">
            <span class="company-tag">Sneaker Company</span>
            <h1 class="product-title">Fall Limited Edition Sneakers</h1>
          </div>

          <p class="product-description">These low-profile sneakers are your perfect casual wear companion. Featuring a durable rubber outer sole, they’ll withstand everything the weather can offer.</p>

          <div class="price-container">
            <div class="current-price-box">
              <span class="price" id="product-price">$125</span>
              <span class="discount">50%</span>
            </div>
            <span class="original-price">$250.00</span>
          </div>

          <div class="purchase-actions">
            <div class="quantity-selector">
              <button class="qty-btn" id="minus-btn" aria-label="Decrease quantity">
                <img src="images/icon-minus.svg" alt="">
              </button>
              <span class="quantity-value">0</span>

              <button class="qty-btn" id="plus-btn" aria-label="Increase quantity">
                <img src="images/icon-plus.svg" alt="">
              </button>
            </div>

            <button class="add-to-cart-btn">
              <img src="images/icon-cart.svg" alt="">
              Add to cart
            </button>
          </div>
        </div>
      </article>
    </main>

  </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
  <title>Document</title>
</head>

<body>
  <div class="container">

    <header class="header">
      <div class="header-left">
        <img src="https://raw.githubusercontent.com/Kking927/ecommerce-product-page/93bbd7878195427df6ee3ee04c3baaa2f2b602c7/images/logo.svg" alt="Sneakers logo image" class="header-logo">

        <nav class="nav">
          <button type="button" class="menu-button" aria-label="Open menu">
            <img src="https://raw.githubusercontent.com/Kking927/ecommerce-product-page/93bbd7878195427df6ee3ee04c3baaa2f2b602c7/images/icon-menu.svg" alt="">
          </button>

          <ul class="nav-list">
            <li><a href="#">Collections</a></li>
            <li><a href="#">Men</a></li>
            <li><a href="#">Women</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
          </ul>
        </nav>
      </div>

      <div class="header-icons">
        <button type="button" class="shopping-cart" aria-label="Open shopping cart">
          <img src="https://raw.githubusercontent.com/Kking927/ecommerce-product-page/93bbd7878195427df6ee3ee04c3baaa2f2b602c7/images/icon-cart.svg" alt="">
          <span class="cart-badge">0</span>
        </button>

        <button type="button" class="user-account" aria-label="Open user account">
          <img src="https://github.com/Kking927/ecommerce-product-page/blob/main/images/image-avatar.png?raw=true" alt="User account" class="profile-img">
        </button>
      </div>
    </header>

    <main>
      <article class="product">

        <div class="product-gallery">

          <div class="mobile-slider-container">
            <button type="button" class="slider-arrow prev-btn" aria-label="Previous image">
              <img src="https://raw.githubusercontent.com/Kking927/ecommerce-product-page/93bbd7878195427df6ee3ee04c3baaa2f2b602c7/images/icon-previous.svg" alt="">
            </button>

            <div class="mobile-slides">
              <img class="mobile-slide active" src="https://github.com/Kking927/ecommerce-product-page/blob/main/images/image-product-1.jpg?raw=true" alt="Product view 1">
              <img class="mobile-slide" src="https://github.com/Kking927/ecommerce-product-page/blob/main/images/image-product-2.jpg?raw=true" alt="Product view 2">
              <img class="mobile-slide" src="https://github.com/Kking927/ecommerce-product-page/blob/main/images/image-product-3.jpg?raw=true" alt="Product view 3">
              <img class="mobile-slide" src="https://github.com/Kking927/ecommerce-product-page/blob/main/images/image-product-4.jpg?raw=true" alt="Product view 4">
            </div>

            <button type="button" class="slider-arrow next-btn" aria-label="Next image">
              <img src="https://raw.githubusercontent.com/Kking927/ecommerce-product-page/93bbd7878195427df6ee3ee04c3baaa2f2b602c7/images/icon-next.svg" alt="">
            </button>
          </div>

          <div class="desktop-gallery-container">
            <div class="main-image-btn">
              <img id="main-product-image" src="https://github.com/Kking927/ecommerce-product-page/blob/main/images/image-product-1.jpg?raw=true" alt="Fall Limited Edition Sneakers">
            </div>

            <ul class="thumbnail-list">
              <li class="thumbnail-item">
                <button type="button" class="thumbnail active">
                  <img src="https://github.com/Kking927/ecommerce-product-page/blob/main/images/image-product-1-thumbnail.jpg?raw=true" alt="View product image 1">
                </button>
              </li>
              <li class="thumbnail-item">
                <button type="button" class="thumbnail">
                  <img src="https://github.com/Kking927/ecommerce-product-page/blob/main/images/image-product-2-thumbnail.jpg?raw=true" alt="View product image 2">
                </button>
              </li>
              <li class="thumbnail-item">
                <button type="button" class="thumbnail">
                  <img src="https://github.com/Kking927/ecommerce-product-page/blob/main/images/image-product-3-thumbnail.jpg?raw=true" alt="View product image 3">
                </button>
              </li>
              <li class="thumbnail-item">
                <button type="button" class="thumbnail">
                  <img src="https://github.com/Kking927/ecommerce-product-page/blob/main/images/image-product-4-thumbnail.jpg?raw=true" alt="View product image 4">
                </button>
              </li>
            </ul>
          </div>

        </div>
        <div class="product-info">
          <div class="title-group">
            <span class="company-tag">Sneaker Company</span>
            <h1 class="product-title">Fall Limited Edition Sneakers</h1>
          </div>

          <p class="product-description">These low-profile sneakers are your perfect casual wear companion. Featuring a durable rubber outer sole, they’ll withstand everything the weather can offer.</p>

          <div class="price-container">
            <div class="current-price-box">
              <span class="price" id="product-price">$125.00</span>
              <span class="discount">50%</span>
            </div>
            <span class="original-price">$250.00</span>
          </div>

          <div class="purchase-actions">
            <div class="quantity-selector">
              <button type="button" class="qty-btn" id="minus-btn" aria-label="Decrease quantity">
                <img src="https://raw.githubusercontent.com/Kking927/ecommerce-product-page/93bbd7878195427df6ee3ee04c3baaa2f2b602c7/images/icon-minus.svg" alt="">
              </button>
              <span class="quantity-value">0</span>

              <button type="button" class="qty-btn" id="plus-btn" aria-label="Increase quantity">
                <img src="https://raw.githubusercontent.com/Kking927/ecommerce-product-page/93bbd7878195427df6ee3ee04c3baaa2f2b602c7/images/icon-plus.svg" alt="">
              </button>
            </div>

            <button type="button" class="add-to-cart-btn">
              <img src="https://raw.githubusercontent.com/Kking927/ecommerce-product-page/93bbd7878195427df6ee3ee04c3baaa2f2b602c7/images/icon-cart.svg" alt="">
              Add to cart
            </button>
          </div>
        </div>
      </article>
    </main>
  </div>

  <dialog id="lightbox-modal" class="lightbox-dialog">
    <div class="lightbox-content">

      <button type="button" class="close-lightbox-btn" id="close-modal" aria-label="Close gallery">
        <img src="https://raw.githubusercontent.com/Kking927/ecommerce-product-page/main/images/icon-close.svg" alt="Close Modal Window">
      </button>

      <div class="lightbox-slider-container">
        <button type="button" class="lightbox-arrow lightbox-prev" aria-label="Previous image">
          <img src="https://raw.githubusercontent.com/Kking927/ecommerce-product-page/main/images/icon-previous.svg" alt="">
        </button>

        <div class="lightbox-main-img-box">
          <img id="lightbox-main-image" src="https://raw.githubusercontent.com/Kking927/ecommerce-product-page/main/images/image-product-1.jpg" alt="Sneakers spotlight view">
        </div>

        <button type="button" class="lightbox-arrow lightbox-next" aria-label="Next image">
          <img src="https://raw.githubusercontent.com/Kking927/ecommerce-product-page/main/images/icon-next.svg" alt="">
        </button>
      </div>

      <div class="lightbox-thumbnail-list">
        <button type="button" class="lightbox-thumb active" aria-label="View lightbox image 1">
          <img src="https://raw.githubusercontent.com/Kking927/ecommerce-product-page/main/images/image-product-1-thumbnail.jpg" alt="">
        </button>
        <button type="button" class="lightbox-thumb" aria-label="View lightbox image 2">
          <img src="https://raw.githubusercontent.com/Kking927/ecommerce-product-page/main/images/image-product-2-thumbnail.jpg" alt="">
        </button>
        <button type="button" class="lightbox-thumb" aria-label="View lightbox image 3">
          <img src="https://raw.githubusercontent.com/Kking927/ecommerce-product-page/main/images/image-product-3-thumbnail.jpg" alt="">
        </button>
        <button type="button" class="lightbox-thumb" aria-label="View lightbox image 4">
          <img src="https://raw.githubusercontent.com/Kking927/ecommerce-product-page/main/images/image-product-4-thumbnail.jpg" alt="">
        </button>
      </div>
    </div>
  </dialog>

</body>

</html>
